<style>
  :root{
    --bg:#0E1217; --surf:#161C24; --surfH:#1C2530; --accent:#BEF264; --ink:#0E1217;
    --pro:#2DD4BF; --carb:#F6B73C; --fat:#A78BFA; --water:#38BDF8;
    --text:#E7ECEF; --muted:#8A949C; --coral:#F6735A;
    --hdr-bg:#0E1217; --hdr-border:transparent;
  }
  html[data-theme="light"]{
    --bg:#F4F6F8; --surf:#FFFFFF; --surfH:#E8EDF2; --accent:#22C55E; --ink:#FFFFFF;
    --text:#0D1117; --muted:#6B7280; --coral:#EF4444;
    --hdr-bg:#FFFFFF; --hdr-border:#E5E7EB;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .phone{max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg);
    display:flex; flex-direction:column; position:relative;}
  header{display:flex; justify-content:space-between; align-items:center; padding:16px 18px 8px; background:var(--hdr-bg); border-bottom:.5px solid var(--hdr-border);}
  header .t{font-size:18px; font-weight:700;}
  header .d{color:var(--muted); font-size:13px;}
  .theme-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;font-size:20px;line-height:0;border-radius:10px;}
  main{flex:1; overflow:auto; padding:8px 16px 96px;}
  .card{background:var(--surf); border-radius:20px; padding:16px; margin-bottom:14px;}
  .row{display:flex; align-items:center;}
  .bar{height:8px; background:var(--surfH); border-radius:6px; overflow:hidden; margin-top:5px;}
  .bar > i{display:block; height:8px; border-radius:6px; transition:width .45s cubic-bezier(.2,.8,.2,1);}
  .mealgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .meal{background:var(--surf); border-radius:18px; padding:13px 15px; display:flex;
    justify-content:space-between; align-items:center; cursor:pointer; transition:transform .12s;}
  .meal:active{transform:scale(.97);}
  .meal .k{font-weight:800; font-size:18px;}
  .qa{display:flex; gap:10px; margin:6px 0 4px;}
  .qa button{flex:1; background:var(--surf); border:none; color:var(--text); border-radius:16px;
    padding:12px 4px; font-size:11px; cursor:pointer;}
  .qa button.primary{background:var(--accent); color:var(--ink); font-weight:700;}
  .qa button i{font-size:18px; display:block; margin-bottom:3px;}
  .tabbar{position:sticky; bottom:0; display:flex; background:var(--bg);
    border-top:.5px solid var(--surfH);}
  .tabbar button{flex:1; background:none; border:none; color:var(--muted); padding:9px 0 11px;
    font-size:11px; cursor:pointer;}
  .tabbar button i{font-size:20px; display:block; margin-bottom:2px;}
  .tabbar button.on{color:var(--accent);}
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:flex-end;
    justify-content:center; z-index:20;}
  .sheet-bg.show{display:flex; animation:bgFadeIn .2s ease both;}
  @keyframes bgFadeIn{from{opacity:0}to{opacity:1}}
  .sheet{width:100%; max-width:430px; background:var(--bg); border-radius:24px 24px 0 0;
    padding:10px 16px 24px; max-height:88vh; overflow:auto; animation:sheetUp .28s cubic-bezier(.16,1,.3,1) both;}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grab{width:44px; height:5px; background:var(--surfH); border-radius:3px; margin:6px auto 12px;}
  .fitem{display:flex; justify-content:space-between; align-items:center; padding:11px 4px;
    border-bottom:.5px solid var(--surfH); cursor:pointer;}
  .chip{display:inline-block; padding:7px 13px; border-radius:12px; background:var(--surfH);
    color:var(--text); font-size:13px; margin:0 6px 6px 0; cursor:pointer; border:none;}
  .chip.on{background:var(--accent); color:var(--ink); font-weight:700;}
  input,button{font-family:inherit;}
  .in{width:100%; background:var(--surfH); border:none; color:var(--text); border-radius:14px;
    padding:13px 14px; font-size:15px; outline:none;}
  .btn{width:100%; background:var(--accent); color:var(--ink); border:none; border-radius:16px;
    padding:15px; font-weight:700; font-size:16px; cursor:pointer;}
  .ghost{background:none; border:.5px solid var(--surfH); color:var(--text); border-radius:14px;
    padding:11px; cursor:pointer; width:100%;}
  .muted{color:var(--muted);} .sm{font-size:12px;} .star{color:var(--carb);}
  .toast{position:fixed; left:50%; bottom:84px; transform:translateX(-50%); background:var(--accent);
    color:var(--ink); font-weight:700; padding:10px 16px; border-radius:14px; opacity:0;
    transition:opacity .25s; z-index:40; pointer-events:none; font-size:13px;}
  .toast.show{opacity:1;}
  h3{font-size:16px; margin:6px 2px 10px;}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; font-size:12px; color:var(--muted);}
  .legend i{width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:4px;}
  .pill{display:inline-flex; align-items:center; gap:5px; background:var(--surfH); border-radius:20px; padding:6px 11px; font-size:12px; font-weight:600;}
  .hscroll{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;}
  .hscroll::-webkit-scrollbar{display:none;}
  .qchip{flex:0 0 auto; background:var(--surf); border:.5px solid var(--surfH); color:var(--text); border-radius:14px; padding:10px 12px; cursor:pointer; min-width:120px; text-align:left; transition:transform .12s, background .15s;}
  .qchip:active{transform:scale(.96);} .qchip:hover{background:var(--surfH);}
  .ins{display:flex; gap:10px; align-items:flex-start; padding:9px 0;}
  .ins + .ins{border-top:.5px solid var(--surfH);}
  .stat{flex:1;} .stat .v{font-weight:700; font-size:15px;}
  .wkbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .wkbar .col{width:100%; height:84px; display:flex; align-items:flex-end;}
  .wkbar .col > i{display:block; width:100%; border-radius:6px 6px 0 0; transition:height .5s cubic-bezier(.2,.8,.2,1);}
  .meal:hover{background:var(--surfH);}
  #view-today.anim > *{animation:fu .34s ease both;}
  @keyframes fu{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  /* Diary (inline meal list in Today view) */
  .diary-section{margin-top:4px;}
  .diary-meal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 2px 6px;border-top:.5px solid var(--surfH);}
  .diary-meal-hdr:first-child{border-top:none;padding-top:4px;}
  .diary-meal-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);cursor:pointer;}
  .diary-meal-kcal{font-size:12px;color:var(--muted);margin-left:8px;}
  .diary-add{background:var(--surfH);border:none;color:var(--accent);width:34px;height:34px;border-radius:11px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .diary-food{display:flex;align-items:center;padding:9px 2px;gap:8px;cursor:pointer;border-radius:12px;transition:background .1s;}
  .diary-food:active{background:var(--surfH);}
  .diary-food-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .diary-food-brand{font-weight:400;color:var(--muted);}
  .diary-food-meta{font-size:12px;color:var(--muted);margin-top:1px;}
  .diary-del{background:none;border:none;color:var(--muted);min-width:40px;min-height:40px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;}
  /* Meal full-page tabs */
  .meal-tabs{display:flex;overflow-x:auto;gap:0;border-bottom:.5px solid var(--surfH);margin:0 -16px;padding:0 16px;-webkit-overflow-scrolling:touch;}
  .meal-tabs::-webkit-scrollbar{display:none;}
  .meal-tab{flex:0 0 auto;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);padding:12px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:color .15s;}
  .meal-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
  /* Food search rows — bigger/bolder, MyNetDiary-inspired */
  .frow{display:flex;align-items:center;padding:14px 4px;border-bottom:.5px solid var(--surfH);cursor:pointer;transition:background .1s;}
  .frow:active{background:var(--surfH);}
  .frow-name{font-size:16px;font-weight:700;line-height:1.2;}
  .frow-brand{font-size:13px;color:var(--muted);margin-top:2px;}
  .frow-kcal{font-size:17px;font-weight:800;color:var(--accent);white-space:nowrap;}
  .frow-serv{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
  .frow-qadd{background:var(--accent);border:none;color:#0E1217;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s;margin-left:10px;}
  .frow-qadd:active{transform:scale(.88);}
  /* Food add full page */
  .food-search-bar{position:relative;margin-bottom:12px;}
  .food-search-bar i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;pointer-events:none;}
  .food-search-bar input{padding-left:44px;}
  .food-action-row{display:flex;gap:8px;margin-bottom:14px;}
  .food-action-btn{flex:1;background:var(--surfH);border:none;color:var(--text);border-radius:16px;padding:12px 4px 10px;cursor:pointer;text-align:center;}
  .food-action-btn i{font-size:22px;display:block;margin-bottom:4px;color:var(--accent);}
  .food-action-btn span{font-size:11px;color:var(--muted);}
  .food-section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:14px 4px 6px;}
  .pgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .pcell{position:relative; aspect-ratio:3/4; border-radius:12px; overflow:hidden; background:var(--surfH); cursor:pointer;}
  .pcell img{width:100%; height:100%; object-fit:cover; display:block;}
  .pbadge{position:absolute; top:6px; left:6px; background:rgba(0,0,0,.62); color:#fff; font-size:11px; font-weight:700; padding:2px 7px; border-radius:8px;}
  .pdate{position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; padding:1px 6px; border-radius:7px;}
  .ppose{position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; padding:1px 6px; border-radius:7px; text-transform:capitalize;}
</style>

function applyTheme(){

}
window.toggleTheme=()=>{_isDark=!_isDark;applyTheme();try{localStorage.setItem('mv_theme',_isDark?'dark':'light');}catch(e){}};

window.pwaInstall=async()=>{if(!_deferredInstall)return;_deferredInstall.prompt();

  if(r.outcome==='accepted')toast('Added to home screen!');};

// Live branded-food search via Open Food Facts (same source the native app uses).
async function offSearch(q){
  try{
    const u='https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+
      '&search_simple=1&action=process&json=1&page_size=25'+
      '&fields=product_name,brands,nutriments,serving_quantity';
    const r=await fetch(u);
    if(!r.ok)return[];
    const j=await r.json();
    return (j.products||[]).map(p=>{
      const n=p.nutriments||{}; const name=(p.product_name||'').trim();
      const kc=n['energy-kcal_100g']; if(!name||kc==null)return null;
      const sq=p.serving_quantity?parseFloat(p.serving_quantity):null;
      const fac=sq&&sq>0?sq/100:1;
      return {name, brand:(p.brands||'').split(',')[0].trim(), off:true,
        serv:sq?`1 serving (${Math.round(sq)} g)`:'100 g',
        kcal:Math.round(kc*fac),
        p:+(((n.proteins_100g||0))*fac).toFixed(1),
        c:+(((n.carbohydrates_100g||0))*fac).toFixed(1),
        f:+(((n.fat_100g||0))*fac).toFixed(1),
        m:offMicros(n,fac)};
    }).filter(Boolean);
  }catch(e){return[];}
}

    arcs=`<circle cx="60" cy="60" r="52" fill="none" stroke="#1C2530" stroke-width="14"/>`+
      arc(lp,0,'#2DD4BF')+arc(lc,-lp,'#F6B73C')+arc(lf,-(lp+lc),'#A78BFA');}
  const net=GOAL.cal+(burned||0)-t.kcal;

function recents(){return Object.values(S.usage)
  .sort((a,b)=>(b.fav-a.fav)||(b.last-a.last)).map(u=>u.f);}

function foodEmoji(name){
  const n=(name||'').toLowerCase();
  if(/chicken|turkey|breast|wing|drumstick/.test(n))return'🍗';
  if(/beef|steak|burger|ground|bison/.test(n))return'🥩';
  if(/pork|bacon|ham|sausage/.test(n))return'🥓';
  if(/salmon|fish|tuna|shrimp|seafood|tilapia|cod/.test(n))return'🐟';
  if(/egg/.test(n))return'🥚';
  if(/rice|oat|grain|cereal|bread|pasta|noodle|tortilla|bagel|wrap/.test(n))return'🍚';
  if(/milk|yogurt|dairy|cheese|cream|cottage/.test(n))return'🥛';
  if(/apple/.test(n))return'🍎';
  if(/banana/.test(n))return'🍌';
  if(/berry|strawberry|blueberry|raspberry/.test(n))return'🍓';
  if(/orange|mango|pineapple|fruit/.test(n))return'🍊';
  if(/broccoli|spinach|kale|salad|vegetable|carrot|celery|cucumber/.test(n))return'🥦';
  if(/sweet potato|potato/.test(n))return'🥔';
  if(/avocado/.test(n))return'🥑';
  if(/almond|peanut|nut|walnut|cashew/.test(n))return'🥜';
  if(/olive oil|oil|butter|fat/.test(n))return'🫒';
  if(/protein|shake|powder|supplement|whey|casein/.test(n))return'💪';
  if(/coffee|tea|espresso/.test(n))return'☕';
  if(/water|juice/.test(n))return'💧';
  if(/chocolate|bar|cookie|candy|cake|donut|ice cream/.test(n))return'🍫';
  if(/pizza/.test(n))return'🍕';
  if(/sandwich|sub/.test(n))return'🥪';
  if(/soup|broth/.test(n))return'🍲';
  return'🍽️';
}

      <div class="frow-kcal">${f.kcal} cal</div>
      <div style="font-size:11px;color:#2DD4BF;font-weight:600;margin-top:1px">${f.p}g protein</div>
      <div class="frow-serv">${f.serv}</div>

    <button onclick="event.stopPropagation();toggleFav(${i})" style="background:none;border:none;font-size:20px;cursor:pointer;padding:6px;line-height:1;color:${fav?'#F6B73C':'var(--surfH)'};flex-shrink:0">${fav?'★':'☆'}</button>

window.toggleFav=i=>{const f=DISPLAY[i];if(!f)return;const k=fkey(f);

  S.usage[k].fav=!S.usage[k].fav;save();

window.portion=i=>{const f=DISPLAY[i];if(!f)return;window._port={f,qty:f.lastQty||1};renderPortion();};
function renderPortion(){const {f,qty}=window._port;const kc=Math.round(f.kcal*qty);

  const micro=f.m||{};const hasMicro=Object.values(micro).some(v=>v>0);
  openSheet(`<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
    <div style="font-size:48px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:var(--surfH);border-radius:18px;flex-shrink:0">${foodEmoji(f.name)}</div>

      <div style="margin-top:4px"><span style="font-size:11px;font-weight:700;color:${pScore.c};background:${pScore.c}22;padding:2px 8px;border-radius:8px">${pScore.l}</span></div>

function norm(arr){const v=arr.map(x=>x[1]);const mn=Math.min(...v),mx=Math.max(...v);const r=(mx-mn)||1;
  return arr.map(x=>[x[0],(x[1]-mn)/r]);}
let _pRange=180,_pHidden={};
window.setPRange=d=>{_pRange=d;renderProgress();};
window.togSeries=k=>{_pHidden[k]=!_pHidden[k];renderProgress();};
function allDefs(){return [...METRICS,...(S.customMetrics||[])];}
function colorFor(key){const m=METRICS.find(x=>x.key===key);if(m)return m.color;
  const h=(key.split('').reduce((a,b)=>a+b.charCodeAt(0),0)*47)%360;return `hsl(${h},55%,62%)`;}
function pRangeCut(){if(_pRange>=9999)return '0000-00-00';const d=new Date();d.setDate(d.getDate()-_pRange);return d.toISOString().slice(0,10);}
function filterPts(pts){const c=pRangeCut();const f=pts.filter(p=>p[0]>=c);return f.length?f:pts.slice(-1);}
function spark(pts,color){if(pts.length<2)return '';const v=pts.map(p=>p[1]),mn=Math.min(...v),mx=Math.max(...v),r=(mx-mn)||1,W=64,H=22;
  const P=pts.map((p,i)=>`${i/(pts.length-1)*W},${H-2-((p[1]-mn)/r)*(H-4)}`).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline fill="none" stroke="${color}" stroke-width="2" points="${P}"/></svg>`;}

  const defs=[{key:'weight',name:'Weight',unit:'lbs',hi:false,dash:true},...allDefs()];

  defs.forEach(d=>{const raw=d.key==='weight'?S.weight:(S.metrics[d.key]||[]);if(!raw||!raw.length)return;
    series.push({...d,color:d.key==='weight'?'#2DD4BF':colorFor(d.key),pts:filterPts(raw)});});
  const vis=series.filter(s=>!_pHidden[s.key]);
  const days=[...new Set(vis.flatMap(s=>s.pts.map(p=>p[0])))].sort();
  const xi=Object.fromEntries(days.map((d,i)=>[d,i]));

    chart+=`<polyline fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" ${s.dash?'stroke-dasharray="5 4"':''} points="${xy.map(a=>a.join(',')).join(' ')}"/>`;
    // 7-day rolling average for weight
    if(s.key==='weight'&&s.pts.length>=3){
      const raw=s.pts;const mn=Math.min(...raw.map(p=>p[1])),mx=Math.max(...raw.map(p=>p[1])),r2=(mx-mn)||1;
      const avgPts=raw.map((p,i)=>{const window7=raw.slice(Math.max(0,i-3),Math.min(raw.length,i+4));
        const avg=window7.reduce((s,x)=>s+x[1],0)/window7.length;
        return[(days.length<2?0.5:xi[p[0]]/(days.length-1))*W, H-14-((avg-mn)/r2)*(H-38)];});

function loadScript(src){return new Promise((res,rej)=>{
  if([...document.scripts].some(s=>s.src===src))return res();
  const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.append(s);});}
function manualBarcode(){const c=prompt('Enter the barcode number to look up:');if(c&&c.trim())lookupBarcode(c.trim());}

async function nativeScan(){
  const formats=['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code'];
  const detector=new BarcodeDetector({formats});
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:#000;z-index:50;display:flex;flex-direction:column';
  const video=document.createElement('video');
  video.style.cssText='flex:1;width:100%;object-fit:cover';
  video.srcObject=stream;video.autoplay=true;video.playsInline=true;
  const vH=Math.min(window.innerWidth*0.5,260);const vW=Math.min(window.innerWidth*0.7,340);
  wrap.innerHTML=`<div style="position:absolute;inset:0;z-index:1;pointer-events:none">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:${vW}px;height:${vH*0.5}px;border:2.5px solid #BEF264;border-radius:10px;box-shadow:0 0 0 4000px rgba(0,0,0,.45)">
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:#BEF264;opacity:.7;animation:scan 1.5s linear infinite"></div>
    </div>
    <div style="position:absolute;top:30%;left:0;right:0;text-align:center;color:#BEF264;font-weight:700;font-size:13px;letter-spacing:1px">POINT AT BARCODE</div>
  </div>`;
  const style=document.createElement('style');style.textContent='@keyframes scan{0%{top:10%}50%{top:85%}100%{top:10%}}';document.head.append(style);
  wrap.prepend(video);
  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='Cancel';cancelBtn.style.cssText='position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:#BEF264;border:none;color:#0E1217;border-radius:14px;padding:14px 40px;font-size:16px;font-weight:700;z-index:2;cursor:pointer;font-family:inherit';
  const typeBtn=document.createElement('button');
  typeBtn.textContent='Type manually';typeBtn.style.cssText='position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:none;border:1.5px solid #5C6670;color:#C9D2D8;border-radius:14px;padding:12px 32px;font-size:14px;z-index:2;cursor:pointer;font-family:inherit';
  wrap.append(cancelBtn,typeBtn);document.body.append(wrap);
  let done=false;
  const cleanup=()=>{done=true;stream.getTracks().forEach(t=>t.stop());wrap.remove();style.remove();};
  cancelBtn.onclick=cleanup;typeBtn.onclick=()=>{cleanup();manualBarcode();};
  await new Promise(r=>setTimeout(r,500));
  while(!done){
    try{const codes=await detector.detect(video);
      if(codes.length){const code=codes[0].rawValue;cleanup();lookupBarcode(String(code).trim());return;}
    }catch(e){}
    await new Promise(r=>setTimeout(r,150));
  }
}
// Camera barcode scanning — tries native BarcodeDetector (Chrome/Android)
// first, then falls back to html5-qrcode (Safari/iOS).
window.scanBarcode=async()=>{
  if('BarcodeDetector' in window){try{await nativeScan();return;}catch(e){}}
  try{await loadScript('https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js');}
  catch(e){return manualBarcode();}
  if(typeof Html5Qrcode==='undefined')return manualBarcode();
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:#000;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0';
  const vH=Math.round(window.innerHeight*0.58);
  const qW=Math.min(260,Math.round(window.innerWidth*0.65));
  const qH=Math.round(qW*0.48);
  wrap.innerHTML=`
    <div style="color:#BEF264;text-align:center;padding:18px 16px 10px;font-weight:700;font-size:13px;letter-spacing:1px">
      HOVER OVER BARCODE — AUTO-DETECTS
    </div>
    <div id="scanview" style="width:100%;height:${vH}px;background:#000;overflow:hidden;position:relative"></div>
    <div style="background:#111;width:100%;padding:16px 20px 36px;display:flex;flex-direction:column;gap:10px;margin-top:auto">
      <div id="scanStatus" style="text-align:center;color:#BEF264;font-size:13px;padding-bottom:4px">Camera starting…</div>
      <button id="scanType" style="background:none;border:1.5px solid #5C6670;color:#C9D2D8;border-radius:14px;padding:13px;font-size:15px;cursor:pointer;font-family:inherit">Type barcode number instead</button>
      <button id="scanX" style="background:#BEF264;border:none;color:#0E1217;border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Cancel</button>
    </div>`;
  document.body.append(wrap);
  const scanner=new Html5Qrcode('scanview',{verbose:false});
  let stopped=false;
  const cleanup=async()=>{if(stopped)return;stopped=true;try{await scanner.stop();}catch(e){}try{scanner.clear();}catch(e){}wrap.remove();};
  document.getElementById('scanX').onclick=cleanup;
  document.getElementById('scanType').onclick=async()=>{await cleanup();manualBarcode();};
  const setSt=t=>{const e=document.getElementById('scanStatus');if(e)e.textContent=t;};
  try{
    await scanner.start({facingMode:'environment'},{fps:20,qrbox:{width:qW,height:qH}},
      async(text)=>{setSt('✓ Found!');await cleanup();lookupBarcode(String(text).trim());},()=>{});
    setSt('Scanning — point at any barcode');
  }catch(e){await cleanup();toast('Camera error: '+(e.message||'allow camera in Settings then retry'));}
};
async function lookupBarcode(code){
  toast('Looking up '+code+'…');
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,brands,nutriments,serving_quantity');
    const j=await r.json();
    if(j.status!==1||!j.product){toast('Not in the database — try search');return;}
    const p=j.product,n=p.nutriments||{};
    const sq=p.serving_quantity?parseFloat(p.serving_quantity):null;const fac=sq&&sq>0?sq/100:1;
    confirmFood({name:p.product_name||'Product',brand:(p.brands||'').split(',')[0].trim(),off:true,
      serv:sq?`1 serving (${Math.round(sq)} g)`:'100 g',
      kcal:Math.round((n['energy-kcal_100g']||0)*fac),
      p:+(((n.proteins_100g||0))*fac).toFixed(1),c:+(((n.carbohydrates_100g||0))*fac).toFixed(1),f:+(((n.fat_100g||0))*fac).toFixed(1),
      m:offMicros(n,fac)});
  }catch(e){toast('Lookup failed — check connection');}
}

async function analyzeFood(b64,mime,key){
  // Structured output via tool use (the reliable Anthropic pattern) — Claude is
  // forced to call log_foods, and we read the typed args from the tool_use block.
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:aiModel(),max_tokens:1024,
      tools:[{name:'log_foods',description:'Record every distinct food detected in the meal photo with estimated calories and macros for the portion actually shown.',input_schema:FOOD_SCHEMA}],
      tool_choice:{type:'tool',name:'log_foods'},

window.openFasting=()=>{
  const f=S.fasting;const now=Date.now();
  const elapsed=f.startTs?Math.floor((now-f.startTs)/3600000):0;
  const targetH=f.window;const done=elapsed>=targetH;
  const pct=f.startTs?Math.min(100,elapsed/targetH*100):0;
  const remaining=f.startTs&&!done?targetH-elapsed:0;
  const hms=ts=>{const h=Math.floor(ts);const m=Math.floor((ts-h)*60);return h>0?`${h}h ${m}m`:`${m}m`;};
  openSheet(`<h3>⏱️ Intermittent fasting</h3>
    ${f.startTs?`<div style="text-align:center;margin:16px 0">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">${done?'✅ Fast complete!':('Fasting · '+hms(elapsed)+' in')}</div>
      <div style="font-size:42px;font-weight:900;color:${done?'#BEF264':'var(--accent)'}">
        ${done?'Done':hms(remaining)+' left'}</div>
      <div class="bar" style="height:8px;border-radius:4px;margin:12px 0"><i style="width:${pct}%;background:${done?'#BEF264':'var(--accent)'}"></i></div>
      <div class="muted sm">${Math.round(pct)}% of ${targetH}h window</div>
      <button class="ghost" style="margin-top:12px;color:#F6735A;border-color:#F6735A33" onclick="endFast()">Stop fast</button>
    </div>`:`<div style="text-align:center;margin:16px 0">
      <div style="font-size:48px;margin-bottom:8px">🕐</div>
      <div class="muted sm" style="margin-bottom:16px">No active fast. Start one to track your window.</div>
      <div style="margin-bottom:14px"><div class="muted sm" style="margin-bottom:6px">Fasting goal</div>
        <div class="hscroll" style="justify-content:center">${[12,14,16,18,20].map(h=>
          `<button class="chip ${f.window===h?'on':''}" onclick="S.fasting.window=${h};save();openFasting()">${h}:${24-h}</button>`).join('')}</div>

window.endFast=()=>{const h=S.fasting.startTs?Math.floor((Date.now()-S.fasting.startTs)/3600000):0;

function fastingCard(){const f=S.fasting;if(!f.startTs)return'';

// ---- Nutrition grade ----
function nutritionGrade(){
  const t=totals();if(!t.kcal)return null;
  const mt=microTotals();let score=100;
  // Penalize for being way over/under calories
  const calRatio=t.kcal/GOAL.cal;
  if(calRatio>1.15)score-=15;else if(calRatio<0.6)score-=10;
  // Reward hitting protein goal
  const pRatio=t.p/GOAL.p;
  if(pRatio>=0.9)score+=10;else if(pRatio<0.6)score-=20;
  // Penalize excess fat or carbs
  if(t.f>GOAL.f*1.3)score-=8;
  if(t.c>GOAL.c*1.4)score-=8;
  // Reward fiber
  if(mt.fiber>=20)score+=8;else if(mt.fiber<10)score-=5;
  // Penalize high sodium
  if(mt.sodium>2500)score-=10;
  // Reward balanced macros
  const pc=t.p*4,cc=t.c*4,fc=t.f*9,tot2=pc+cc+fc;
  if(tot2>0){const pPct=pc/tot2;if(pPct>=0.25&&pPct<=0.4)score+=5;}
  score=Math.max(0,Math.min(100,score));
  const grade=score>=93?'A+':score>=87?'A':score>=80?'B+':score>=73?'B':score>=65?'C+':score>=55?'C':score>=45?'D':'F';
  const col=score>=80?'#BEF264':score>=60?'#F6B73C':'#F6735A';
  return{grade,score,col};}

function foodGroups(){const all=SLOTS.flatMap(([k])=>S.meals[k]);if(!all.length)return'';
  const groups={protein:{e:'🍗',n:'Protein',items:[],color:'#2DD4BF'},grain:{e:'🌾',n:'Grains',items:[],color:'#F6B73C'},fruit:{e:'🍎',n:'Fruits',items:[],color:'#F6735A'},veg:{e:'🥦',n:'Veggies',items:[],color:'#BEF264'},dairy:{e:'🥛',n:'Dairy',items:[],color:'#A78BFA'},fat:{e:'🥑',n:'Fats',items:[],color:'#5C9EF6'}};
  const classify=name=>{const n=name.toLowerCase();
    if(/chicken|beef|pork|fish|egg|tuna|salmon|turkey|shrimp|steak|protein|whey|lamb|cod|tilapia/.test(n))return'protein';
    if(/rice|bread|pasta|oat|cereal|wheat|quinoa|corn|tortilla|bagel|cracker|noodle/.test(n))return'grain';
    if(/apple|banana|orange|berry|grape|mango|peach|pear|pineapple|strawberry|blueberry|cherry|melon/.test(n))return'fruit';
    if(/broccoli|spinach|kale|salad|carrot|tomato|pepper|cucumber|onion|celery|lettuce|asparagus|zucchini/.test(n))return'veg';
    if(/milk|cheese|yogurt|dairy|cream|butter/.test(n))return'dairy';
    if(/olive oil|avocado|nut|almond|cashew|peanut|walnut|oil|coconut/.test(n))return'fat';
    return null;};
  all.forEach(x=>{const g=classify(x.name);if(g)groups[g].items.push(x.name);});
  const filled=Object.values(groups).filter(g=>g.items.length);
  if(!filled.length)return'';
  return `<div class="card fade" style="margin-top:14px">
    <h3 style="margin:0 0 10px">Food groups today</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">

// ---- Projected weight change from deficit ----
function deficitProjection(){
  const days=Object.keys(S.history).filter(d=>S.history[d].logged).length;
  if(days<3)return null;
  const avg=Math.round(Object.values(S.history).filter(h=>h.logged).reduce((s,h)=>s+h.kcal,0)/days);
  const dailyDelta=avg-GOAL.cal;
  const lbsPerWeek=dailyDelta*7/3500;
  return{avg,dailyDelta,lbsPerWeek,days};}

window.calcTDEE=()=>{
  const age=parseFloat(document.getElementById('tAge').value)||28;
  const wt=parseFloat(document.getElementById('tWt').value)||180;
  const ht=parseFloat(document.getElementById('tHt').value)||180;
  const sex=document.getElementById('tSex').value;
  const act=parseFloat(document.getElementById('tAct').value)||1.375;
  const adj=parseInt(document.getElementById('tGoal').value)||0;
  const wtKg=wt*0.453592;
  const bmr=sex==='male'?10*wtKg+6.25*ht-5*age+5:10*wtKg+6.25*ht-5*age-161;
  const tdee=Math.round(bmr*act);const target=tdee+adj;
  const protein=Math.round(wtKg*2.2);
  const fat=Math.round(target*0.25/9);
  const carbs=Math.round((target-protein*4-fat*9)/4);
  S.meas={...S.meas,age,height:ht,sex};save();
  const out=document.getElementById('tdeeOut');
  if(out){out.style.display='block';out.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:6px">TDEE: <b>${tdee} kcal</b> · Target: <b style="color:var(--accent)">${target} kcal</b></div><div style="font-size:12px;color:var(--muted)">Protein: ${protein}g · Carbs: ${carbs}g · Fat: ${fat}g</div><button class="btn" style="margin-top:10px;padding:10px" onclick="applyTDEE(${target},${protein},${carbs},${fat})">Apply these goals</button>`;}};
window.applyTDEE=(cal,p,c,f)=>{GOAL={cal,p,c,f};localStorage.setItem('mv_goal',JSON.stringify(GOAL));save();closeSheet();renderAll();toast('Goals updated to '+cal+' kcal');};
window.saveGoals=()=>{
  const cal=parseInt(document.getElementById('gCal').value)||GOAL.cal;
  const p=parseInt(document.getElementById('gP').value)||GOAL.p;
  const c=parseInt(document.getElementById('gC').value)||GOAL.c;
  const f=parseInt(document.getElementById('gF').value)||GOAL.f;
  const tw=parseFloat(document.getElementById('gTW')?.value)||null;
  GOAL={cal,p,c,f,...(tw?{targetWeight:tw}:{})};localStorage.setItem('mv_goal',JSON.stringify(GOAL));save();closeSheet();renderAll();toast('Goals saved');};

// ---- Nutrition label popup (tap diary food item) ----
window.diaryFoodDetail=(k,i)=>{
  const x=S.meals[k][i];if(!x)return;
  const micro=x.m||{};const qty=x.qty;
  const rows=Object.keys(MTARGET).map(key=>{const v=((micro[key]||0)*qty);const [tg,unit,limit]=MTARGET[key];
    const col=limit&&v>tg?'#F6735A':limit?'var(--text)':'#2DD4BF';
    return `<div class="row" style="justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--surfH);font-size:13px">
      <span>${MNAME[key]}</span><span style="color:${col}">${v<10?(v*10|0)/10:Math.round(v)} ${unit==='g'?'g':unit}</span></div>`;}).join('');
  openSheet(`<h3>${x.name}${x.brand?` · <span class="muted">${x.brand}</span>`:''}</h3>
    <div class="row" style="gap:16px;text-align:center;margin:14px 0;padding:12px;background:var(--surfH);border-radius:14px">
      <div><div style="font-size:22px;font-weight:800">${Math.round(x.kcal*qty)}</div><div class="muted sm">kcal</div></div>
      <div><div style="font-size:22px;font-weight:800;color:#2DD4BF">${Math.round(x.p*qty)}g</div><div class="muted sm">protein</div></div>
      <div><div style="font-size:22px;font-weight:800;color:#F6B73C">${Math.round(x.c*qty)}g</div><div class="muted sm">carbs</div></div>
      <div><div style="font-size:22px;font-weight:800;color:#A78BFA">${Math.round(x.f*qty)}g</div><div class="muted sm">fat</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${qty}× ${x.serv||'1 serving'} · ${x.time?x.time:''}</div>
    ${rows?`<div style="margin-bottom:14px">${rows}</div>`:''}
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeSheet();editItemQty('${k}',${i})">Edit qty</button>
      <button class="ghost" style="flex:0 0 auto;padding:14px 16px" onclick="closeSheet();delItem('${k}',${i})"><i class="ti ti-x"></i></button>
    </div>`);};

// ---- Copy yesterday's meals ----
window.copyYesterday=()=>{
  const yKey=dayKey(-1),yH=S.history[yKey];
  if(!yH||!yH.logged){toast('No meals logged yesterday');return;}
  const yMeals=yH._meals;
  if(!yMeals){toast('Yesterday\'s meal breakdown not available — log today first to enable this');return;}
  let count=0;
  SLOTS.forEach(([k])=>{(yMeals[k]||[]).forEach(x=>{S.meals[k].push({...x,time:timeNow()});count++;});});
  if(!count){toast('No foods found from yesterday');return;}
  save();renderToday();toast('Copied '+count+' items from yesterday');};

function renderAll(){renderToday();renderProgress();renderVault();renderMore();}
function animateToday(){const el=$('#view-today');el.classList.remove('anim');void el.offsetWidth;el.classList.add('anim');}
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>{
  const tab=b.dataset.tab;
  _inMealsView=false; _inFoodPage=false;
  $('#backBtn').style.display='none';
  document.querySelectorAll('.tabbar button').forEach(x=>x.classList.toggle('on',x===b));
  ['today','meals','addfood','progress','vault','more'].forEach(v=>$('#view-'+v).style.display=v===tab?'block':'none');
  $('#hTitle').textContent={today:'MacroVault',progress:'Progress',vault:'Vault',more:'More'}[tab];
  if(tab==='today')animateToday();
});
renderAll();
animateToday();
scheduleCoach();
</script>
</body>
</html>
