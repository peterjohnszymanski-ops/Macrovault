<!DOCTYPE html>
<html lang="en">

<style>
  :root{
    --bg:#0E1217; --surf:#161C24; --surfH:#1C2530; --accent:#BEF264; --ink:#0E1217;
    --pro:#2DD4BF; --carb:#F6B73C; --fat:#A78BFA; --water:#38BDF8;
    --text:#E7ECEF; --muted:#8A949C; --coral:#F6735A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:#05080b; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .phone{max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg);
    display:flex; flex-direction:column; position:relative;}
  header{display:flex; justify-content:space-between; align-items:center; padding:16px 18px 8px;}
  header .t{font-size:18px; font-weight:700;}
  header .d{color:var(--muted); font-size:13px;}
  main{flex:1; overflow:auto; padding:8px 16px 96px;}
  .card{background:var(--surf); border-radius:20px; padding:16px; margin-bottom:14px;}
  .row{display:flex; align-items:center;}
  .bar{height:8px; background:var(--surfH); border-radius:6px; overflow:hidden; margin-top:5px;}
  .bar > i{display:block; height:8px; border-radius:6px; transition:width .45s cubic-bezier(.2,.8,.2,1);}
  .mealgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .meal{background:var(--surf); border-radius:18px; padding:13px 15px; display:flex;
    justify-content:space-between; align-items:center; cursor:pointer; transition:transform .12s;}
  .meal:active{transform:scale(.97);}
  .meal .k{font-weight:800; font-size:18px;}
  .qa{display:flex; gap:10px; margin:6px 0 4px;}
  .qa button{flex:1; background:var(--surf); border:none; color:#C9D2D8; border-radius:16px;
    padding:12px 4px; font-size:11px; cursor:pointer;}
  .qa button.primary{background:var(--accent); color:var(--ink); font-weight:700;}
  .qa button i{font-size:18px; display:block; margin-bottom:3px;}
  .tabbar{position:sticky; bottom:0; display:flex; background:var(--bg);
    border-top:.5px solid var(--surfH);}
  .tabbar button{flex:1; background:none; border:none; color:#5C6670; padding:9px 0 11px;
    font-size:11px; cursor:pointer;}
  .tabbar button i{font-size:20px; display:block; margin-bottom:2px;}
  .tabbar button.on{color:var(--accent);}
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:flex-end;
    justify-content:center; z-index:20;}
  .sheet-bg.show{display:flex;}
  .sheet{width:100%; max-width:430px; background:var(--bg); border-radius:24px 24px 0 0;
    padding:10px 16px 24px; max-height:88vh; overflow:auto;}
  .grab{width:44px; height:5px; background:var(--surfH); border-radius:3px; margin:6px auto 12px;}
  .fitem{display:flex; justify-content:space-between; align-items:center; padding:11px 4px;
    border-bottom:.5px solid var(--surfH); cursor:pointer;}
  .chip{display:inline-block; padding:7px 13px; border-radius:12px; background:var(--surfH);
    color:var(--text); font-size:13px; margin:0 6px 6px 0; cursor:pointer; border:none;}
  .chip.on{background:var(--accent); color:var(--ink); font-weight:700;}
  input,button{font-family:inherit;}
  .in{width:100%; background:var(--surfH); border:none; color:var(--text); border-radius:14px;
    padding:13px 14px; font-size:15px; outline:none;}
  .btn{width:100%; background:var(--accent); color:var(--ink); border:none; border-radius:16px;
    padding:15px; font-weight:700; font-size:16px; cursor:pointer;}
  .ghost{background:none; border:.5px solid var(--surfH); color:var(--text); border-radius:14px;
    padding:11px; cursor:pointer; width:100%;}
  .muted{color:var(--muted);} .sm{font-size:12px;} .star{color:var(--carb);}
  .toast{position:fixed; left:50%; bottom:84px; transform:translateX(-50%); background:var(--accent);
    color:var(--ink); font-weight:700; padding:10px 16px; border-radius:14px; opacity:0;
    transition:opacity .25s; z-index:40; pointer-events:none; font-size:13px;}
  .toast.show{opacity:1;}
  h3{font-size:16px; margin:6px 2px 10px;}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; font-size:12px; color:var(--muted);}
  .legend i{width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:4px;}
  .pill{display:inline-flex; align-items:center; gap:5px; background:var(--surfH); border-radius:20px; padding:6px 11px; font-size:12px; font-weight:600;}
  .hscroll{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;}
  .hscroll::-webkit-scrollbar{display:none;}
  .qchip{flex:0 0 auto; background:var(--surf); border:.5px solid var(--surfH); color:var(--text); border-radius:14px; padding:10px 12px; cursor:pointer; min-width:120px; text-align:left; transition:transform .12s, background .15s;}
  .qchip:active{transform:scale(.96);} .qchip:hover{background:var(--surfH);}
  .ins{display:flex; gap:10px; align-items:flex-start; padding:9px 0;}
  .ins + .ins{border-top:.5px solid var(--surfH);}
  .stat{flex:1;} .stat .v{font-weight:700; font-size:15px;}
  .wkbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .wkbar .col{width:100%; height:84px; display:flex; align-items:flex-end;}
  .wkbar .col > i{display:block; width:100%; border-radius:6px 6px 0 0; transition:height .5s cubic-bezier(.2,.8,.2,1);}
  .meal:hover{background:var(--surfH);}
  #view-today.anim > *{animation:fu .34s ease both;}
  @keyframes fu{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .pgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .pcell{position:relative; aspect-ratio:3/4; border-radius:12px; overflow:hidden; background:var(--surfH); cursor:pointer;}
  .pcell img{width:100%; height:100%; object-fit:cover; display:block;}
  .pbadge{position:absolute; top:6px; left:6px; background:rgba(0,0,0,.62); color:#fff; font-size:11px; font-weight:700; padding:2px 7px; border-radius:8px;}
  .pdate{position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; padding:1px 6px; border-radius:7px;}
  .ppose{position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; padding:1px 6px; border-radius:7px; text-transform:capitalize;}
</style>

<body>
<div class="phone">
  <header>
    <div><div class="t" id="hTitle">MacroVault</div><div class="d" id="hSub"></div></div>
    <div style="width:34px;height:34px;border-radius:50%;background:var(--surfH);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--accent)">P</div>
  </header>
  <main>
    <div id="view-today"></div>
    <div id="view-progress" style="display:none"></div>
    <div id="view-vault" style="display:none"></div>
    <div id="view-more" style="display:none"></div>
  </main>
  <div class="tabbar">
    <button data-tab="today" class="on"><i class="ti ti-home"></i>Today</button>
    <button data-tab="progress"><i class="ti ti-chart-line"></i>Progress</button>
    <button data-tab="vault"><i class="ti ti-lock"></i>Vault</button>
    <button data-tab="more"><i class="ti ti-dots"></i>More</button>
  </div>
</div>
<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const C=2*Math.PI*52;
const $=s=>document.querySelector(s);
const fmt=n=>Math.round(n).toLocaleString();
// AI model — default to Haiku 4.5 (cheapest); user can pick a stronger one.
const aiModel=()=>localStorage.getItem('aiModel')||'claude-haiku-4-5';
const today=()=> new Date().toISOString().slice(0,10);
const dayKey=off=>{const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);};
const dayShort=off=>['S','M','T','W','T','F','S'][new Date(Date.now()+off*864e5).getDay()];
const greeting=()=>{const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';};
const currentSlot=()=>{const h=new Date().getHours();return h<11?'breakfast':h<16?'lunch':h<21?'dinner':'snack';};

const GOAL={cal:2200,p:176,c:200,f:61};
const SLOTS=[['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner'],['snack','Snacks']];
const DB=[
  ['Chicken breast','100 g',165,31,0,3.6],['White rice','1 cup',205,4,45,0.4],
  ['Greek yogurt','170 g',100,17,6,0.7],['Banana','1 medium',105,1,27,0.4],
  ['Egg','1 large',72,6,0.4,5],['Salmon fillet','100 g',208,20,0,13],
  ['Oats','40 g',150,5,27,3],['Protein shake','1 scoop',160,30,5,2.5],
  ['Almonds','28 g',164,6,6,14],['Olive oil','1 tbsp',119,0,0,14],
  ['Broccoli','1 cup',55,3.7,11,0.6],['Ground beef 90/10','100 g',176,20,0,10],
  ['Apple','1 medium',95,0.5,25,0.3],['Peanut butter','1 tbsp',94,4,3,8],
  ['Sweet potato','1 medium',112,2,26,0.1],['Cottage cheese','100 g',98,11,3.4,4.3],
];
const METRICS=[
  {key:'bench',name:'Bench press 1RM',unit:'kg',hi:true,color:'#BEF264'},
  {key:'squat',name:'Squat 1RM',unit:'kg',hi:true,color:'#F6B73C'},
  {key:'deadlift',name:'Deadlift 1RM',unit:'kg',hi:true,color:'#A78BFA'},
  {key:'bodyfat',name:'Body fat',unit:'%',hi:false,color:'#F6735A'},
];

// Micronutrients — per serving. Order: fiber,sugar,satfat,sodium(mg),potassium(mg),calcium(mg),iron(mg),vitC(mg),vitD(µg)
const MORD=['fiber','sugar','satfat','sodium','potassium','calcium','iron','vitc','vitd'];
const MICRO_RAW={
  'Chicken breast':[0,0,1,74,256,11,1,0,0.1],'White rice':[0.6,0.1,0.1,2,55,16,1.9,0,0],
  'Greek yogurt':[0,6,0.4,65,240,187,0,0,0],'Banana':[3.1,14,0.1,1,422,6,0.3,10,0],
  'Egg':[0,0.2,1.6,71,69,28,0.9,0,1.1],'Salmon fillet':[0,0,3,59,363,9,0.3,0,11],
  'Oats':[4,0.4,0.5,1,140,21,1.9,0,0],'Protein shake':[1,3,1,80,150,150,1,0,2],
  'Almonds':[3.5,1.2,1,0,208,76,1,0,0],'Olive oil':[0,0,2,0,0,0,0,0,0],
  'Broccoli':[2.4,1.5,0,30,288,43,0.7,81,0],'Ground beef 90/10':[0,0,4,66,318,18,2.5,0,0.1],
  'Apple':[4.4,19,0,2,195,11,0.2,8,0],'Peanut butter':[0.9,1.5,1.5,73,90,7,0.3,0,0],
  'Sweet potato':[3.8,5.4,0,72,438,39,0.7,22,0],'Cottage cheese':[0,3,1.7,364,104,83,0.1,0,0],
};
const MICRO={};Object.keys(MICRO_RAW).forEach(k=>{MICRO[k]={};MORD.forEach((f,i)=>MICRO[k][f]=MICRO_RAW[k][i]);});
const MTARGET={fiber:[30,'g',0],sugar:[50,'g',1],satfat:[20,'g',1],sodium:[2300,'mg',1],potassium:[3500,'mg',0],calcium:[1000,'mg',0],iron:[8,'mg',0],vitc:[90,'mg',0],vitd:[20,'µg',0]};
const MNAME={fiber:'Fiber',sugar:'Sugar',satfat:'Saturated fat',sodium:'Sodium',potassium:'Potassium',calcium:'Calcium',iron:'Iron',vitc:'Vitamin C',vitd:'Vitamin D'};
function offMicros(n,fac){return{fiber:(n.fiber_100g||0)*fac,sugar:(n.sugars_100g||0)*fac,satfat:(n['saturated-fat_100g']||0)*fac,
  sodium:(n.sodium_100g||0)*1000*fac,potassium:(n.potassium_100g||0)*1000*fac,calcium:(n.calcium_100g||0)*1000*fac,
  iron:(n.iron_100g||0)*1000*fac,vitc:(n['vitamin-c_100g']||0)*1000*fac,vitd:(n['vitamin-d_100g']||0)*1e6*fac};}
function microTotals(){const m={};for(const k in MTARGET)m[k]=0;for(const s in S.meals)S.meals[s].forEach(x=>{const mm=x.m||{};for(const k in MTARGET)m[k]+=(mm[k]||0)*x.qty;});return m;}

const G=a=>({name:a[0],brand:'',serv:a[1],kcal:a[2],p:a[3],c:a[4],f:a[5],m:MICRO[a[0]]||{}});
const fkey=f=>f.name+'|'+(f.brand||'');
const dispName=f=>f.brand?`${f.name} · ${f.brand}`:f.name;

// Live branded-food search via Open Food Facts (same source the native app uses).
async function offSearch(q){
  try{
    const u='https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+
      '&search_simple=1&action=process&json=1&page_size=25'+
      '&fields=product_name,brands,nutriments,serving_quantity';
    const r=await fetch(u);
    if(!r.ok)return[];
    const j=await r.json();
    return (j.products||[]).map(p=>{
      const n=p.nutriments||{}; const name=(p.product_name||'').trim();
      const kc=n['energy-kcal_100g']; if(!name||kc==null)return null;
      const sq=p.serving_quantity?parseFloat(p.serving_quantity):null;
      const fac=sq&&sq>0?sq/100:1;
      return {name, brand:(p.brands||'').split(',')[0].trim(), off:true,
        serv:sq?`1 serving (${Math.round(sq)} g)`:'100 g',
        kcal:Math.round(kc*fac),
        p:+(((n.proteins_100g||0))*fac).toFixed(1),
        c:+(((n.carbohydrates_100g||0))*fac).toFixed(1),
        f:+(((n.fat_100g||0))*fac).toFixed(1),
        m:offMicros(n,fac)};
    }).filter(Boolean);
  }catch(e){return[];}
}

const SIL=(bf)=>'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='280' viewBox='0 0 200 280'><rect width='200' height='280' fill='#141a22'/><g fill='#2b3645'><circle cx='100' cy='52' r='25'/><rect x='${66+(bf-16)*0.6}' y='84' width='${68-(bf-16)*1.2}' height='108' rx='22'/><rect x='62' y='150' width='28' height='112' rx='13'/><rect x='110' y='150' width='28' height='112' rx='13'/><rect x='48' y='90' width='19' height='88' rx='9'/><rect x='133' y='90' width='19' height='88' rx='9'/></g></svg>`);
let S=load();
// Coach defaults (merged so existing saves gain the feature without losing data).
S.coach=Object.assign({enabled:false,gymTime:'18:00',trainDays:[1,2,3,4,5],preCarb:true,preCarbG:40,
  cardioPerWeek:3,trainedToday:'',cardioDays:[]},S.coach||{});
S.photos=S.photos||[];
S.lock=S.lock||{enabled:false,pin:''};
function load(){
  const raw=localStorage.getItem('mv6');
  if(raw) return JSON.parse(raw);
  const seed={
    meals:{breakfast:[],lunch:[],dinner:[],snack:[]},
    usage:{}, water:0,
    weight:[[dayKey(-168),86.2],[dayKey(-140),84.6],[dayKey(-112),83.1],[dayKey(-84),82.0],[dayKey(-56),81.2],[dayKey(-28),80.9],[dayKey(-3),80.6]],
    metrics:{bench:[[dayKey(-168),80],[dayKey(-126),86],[dayKey(-84),92],[dayKey(-42),97],[dayKey(-7),102]],
             bodyfat:[[dayKey(-168),21.5],[dayKey(-112),19.6],[dayKey(-70),18.0],[dayKey(-28),16.7],[dayKey(-3),16.0]],
             squat:[[dayKey(-140),120],[dayKey(-70),140],[dayKey(-7),155]],deadlift:[[dayKey(-140),150],[dayKey(-70),175],[dayKey(-7),190]]},
    customMetrics:[],
    meas:{waist:84,neck:38,hips:0,height:180,sex:'male'},
    capsules:[{day:dayKey(-14),title:'Best week',tags:['best week','high protein'],kcal:2180,protein:172,streak:7}],
    photos:[{id:'p1',day:dayKey(-168),src:SIL(21.5),bf:21.5,conf:0.7,pose:'front',notes:'Softer midsection, less definition.'},
            {id:'p2',day:dayKey(-70),src:SIL(18),bf:18.0,conf:0.7,pose:'front',notes:'Waist tightening, some ab outline.'},
            {id:'p3',day:dayKey(-3),src:SIL(16),bf:16.0,conf:0.7,pose:'front',notes:'Visible abs starting, leaner waist.'}],
    history:{}
  };
  log1(seed,'breakfast','Greek yogurt');log1(seed,'breakfast','Oats');log1(seed,'lunch','Chicken breast');
  log1(seed,'lunch','White rice');log1(seed,'snack','Protein shake');
  seed.water=1500;
  // Seed the last 6 days so the streak + weekly chart look alive.
  const past=[2090,2240,1980,2160,2310,2050];
  for(let i=6;i>=1;i--){seed.history[dayKey(-i)]={kcal:past[6-i],p:150+((i*7)%30),logged:true};}
  localStorage.setItem('mv6',JSON.stringify(seed));
  return seed;
}
function syncHistory(){const t=totals();S.history=S.history||{};S.history[today()]={kcal:Math.round(t.kcal),p:Math.round(t.p),logged:t.kcal>0};}
function save(){syncHistory();localStorage.setItem('mv6',JSON.stringify(S));}
function log1(state,slot,name){const f=G(DB.find(d=>d[0]===name));
  state.meals[slot].push({name:f.name,brand:f.brand,kcal:f.kcal,p:f.p,c:f.c,f:f.f,qty:1,m:f.m||{}});
  const k=fkey(f);state.usage[k]=state.usage[k]||{f,count:0,last:0,fav:false};
  state.usage[k].count++;state.usage[k].last=Date.now();}

function totals(){let t={kcal:0,p:0,c:0,f:0};for(const s in S.meals)S.meals[s].forEach(x=>{t.kcal+=x.kcal*x.qty;t.p+=x.p*x.qty;t.c+=x.c*x.qty;t.f+=x.f*x.qty;});return t;}
function mealKcal(s){return S.meals[s].reduce((a,x)=>a+x.kcal*x.qty,0);}

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}
function openSheet(html){$('#sheet').innerHTML='<div class="grab"></div>'+html;$('#sheetBg').classList.add('show');}
function closeSheet(){$('#sheetBg').classList.remove('show');}
$('#sheetBg').addEventListener('click',e=>{if(e.target.id==='sheetBg')closeSheet();});

function arc(len,off,color){const l=Math.max(0,len);
  return `<circle cx="60" cy="60" r="52" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
    stroke-dasharray="${l} ${C-l}" stroke-dashoffset="${off}"/>`;}

function donut(t){
  const pc=t.p*4,cc=t.c*4,fc=t.f*9,tot=pc+cc+fc;
  let arcs='';
  if(tot<=0){arcs=`<circle cx="60" cy="60" r="52" fill="none" stroke="#1C2530" stroke-width="14"/>`;}
  else{const lp=C*pc/tot,lc=C*cc/tot,lf=C*fc/tot;
    arcs=`<circle cx="60" cy="60" r="52" fill="none" stroke="#1C2530" stroke-width="14"/>`+
      arc(lp,0,'#2DD4BF')+arc(lc,-lp,'#F6B73C')+arc(lf,-(lp+lc),'#A78BFA');}
  return `<svg width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="calories left">
    <g transform="rotate(-90 60 60)">${arcs}</g>
    <text x="60" y="56" text-anchor="middle" fill="#E7ECEF" font-size="26" font-weight="800">${fmt(GOAL.cal-t.kcal)}</text>
    <text x="60" y="74" text-anchor="middle" fill="#8A949C" font-size="11">cal left</text></svg>`;
}
function barRow(label,val,target,color){
  return `<div style="margin-bottom:9px"><div class="row" style="justify-content:space-between;font-size:12px">
    <span style="color:${color}">${label}</span><span class="muted">${fmt(val)} / ${target} g</span></div>
    <div class="bar"><i style="width:${Math.min(100,val/target*100)}%;background:${color}"></i></div></div>`;
}

function streak(){let s=0;for(let i=0;;i++){const h=(S.history||{})[dayKey(-i)];if(h&&h.logged)s++;else break;}return s;}
function weekData(){const a=[];for(let i=6;i>=0;i--){const h=(S.history||{})[dayKey(-i)];a.push({off:-i,kcal:h?h.kcal:0});}return a;}
function weekAvg(){const d=weekData().filter(x=>x.kcal>0);return d.length?Math.round(d.reduce((a,x)=>a+x.kcal,0)/d.length):0;}
function spark(vals,color){if(vals.length<2)return '';const mn=Math.min(...vals),mx=Math.max(...vals),r=(mx-mn)||1,w=92,h=30;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-3-(v-mn)/r*(h-6)).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" points="${pts}"/></svg>`;}
function insights(){const t=totals(),out=[],left=GOAL.cal-t.kcal,pGap=Math.round(GOAL.p-t.p),st=streak();

    if(s.c.preCarb&&toGym<=90&&toGym>=10&&s.carbs<s.c.preCarbG)
      return {i:'meat',c:'#F6B73C',title:'Carb up before training',sub:`Gym at ${fmtTime(s.gymMin)} — get ~${s.c.preCarbG}g carbs in now to fuel the lift.`,act:'carb'};
    if(toGym<=15&&toGym>=-150)
      return {i:'barbell',c:'#BEF264',title:'Time to train 💪',sub:'It is gym o-clock. Mark it done when you finish.',act:'train'};
    if(toGym>15)
      return {i:'clock',c:'#2DD4BF',title:`Training at ${fmtTime(s.gymMin)}`,sub:s.c.preCarb?`Plan ~${s.c.preCarbG}g carbs about an hour before.`:'Get ready for the session.',act:'train'};

  if(!s.isGymDay)return {i:'bed',c:'#A78BFA',title:'Rest day',sub:s.cardioWk<s.c.cardioPerWeek?'Good day for some easy cardio.':'Recover well — you are on track.',act:'cardio'};

  if(c.preCarb)at(new Date(gym.getTime()-36e5),()=>notify('Carb up 🍚','Training in about an hour — get ~'+c.preCarbG+'g carbs in now.'));

function norm(arr){const v=arr.map(x=>x[1]);const mn=Math.min(...v),mx=Math.max(...v);const r=(mx-mn)||1;
  return arr.map(x=>[x[0],(x[1]-mn)/r]);}
let _pRange=180,_pHidden={};
window.setPRange=d=>{_pRange=d;renderProgress();};
window.togSeries=k=>{_pHidden[k]=!_pHidden[k];renderProgress();};
function allDefs(){return [...METRICS,...(S.customMetrics||[])];}
function colorFor(key){const m=METRICS.find(x=>x.key===key);if(m)return m.color;
  const h=(key.split('').reduce((a,b)=>a+b.charCodeAt(0),0)*47)%360;return `hsl(${h},55%,62%)`;}
function pRangeCut(){if(_pRange>=9999)return '0000-00-00';const d=new Date();d.setDate(d.getDate()-_pRange);return d.toISOString().slice(0,10);}
function filterPts(pts){const c=pRangeCut();const f=pts.filter(p=>p[0]>=c);return f.length?f:pts.slice(-1);}
function spark(pts,color){if(pts.length<2)return '';const v=pts.map(p=>p[1]),mn=Math.min(...v),mx=Math.max(...v),r=(mx-mn)||1,W=64,H=22;
  const P=pts.map((p,i)=>`${i/(pts.length-1)*W},${H-2-((p[1]-mn)/r)*(H-4)}`).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline fill="none" stroke="${color}" stroke-width="2" points="${P}"/></svg>`;}

function renderProgress(){
  const defs=[{key:'weight',name:'Weight',unit:'kg',hi:false,dash:true},...allDefs()];
  const series=[];
  defs.forEach(d=>{const raw=d.key==='weight'?S.weight:(S.metrics[d.key]||[]);if(!raw||!raw.length)return;
    series.push({...d,color:d.key==='weight'?'#2DD4BF':colorFor(d.key),pts:filterPts(raw)});});
  const vis=series.filter(s=>!_pHidden[s.key]);
  const days=[...new Set(vis.flatMap(s=>s.pts.map(p=>p[0])))].sort();
  const xi=Object.fromEntries(days.map((d,i)=>[d,i]));
  const W=300,H=160;
  let chart='';
  vis.forEach(s=>{const ns=norm(s.pts);
    const xy=ns.map(p=>[(days.length<2?0.5:xi[p[0]]/(days.length-1))*W, H-14-p[1]*(H-38)]);
    chart+=`<polyline fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" ${s.dash?'stroke-dasharray="5 4"':''} points="${xy.map(a=>a.join(',')).join(' ')}"/>`;
    const last=xy[xy.length-1],lv=s.pts[s.pts.length-1][1];
    chart+=`<circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="${s.color}"/><text x="${Math.min(last[0]+5,W-22)}" y="${Math.max(11,last[1]-6)}" fill="${s.color}" font-size="10" font-weight="700">${lv}</text>`;});
  if(!vis.length)chart=`<text x="150" y="84" fill="#5C6670" font-size="12" text-anchor="middle">Tap a legend item to show it</text>`;
  const grid=[45,85,125].map(y=>`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#1C2530"/>`).join('');
  const rangeBtns=[[30,'1M'],[90,'3M'],[180,'6M'],[9999,'All']].map(([d,l])=>`<button class="chip ${_pRange===d?'on':''}" onclick="setPRange(${d})">${l}</button>`).join('');
  const legend=series.map(s=>{const hid=_pHidden[s.key];
    return `<span onclick="togSeries('${s.key}')" style="cursor:pointer;opacity:${hid?0.4:1};text-decoration:${hid?'line-through':'none'}"><i style="background:${s.color}"></i>${s.name}</span>`;}).join('');
  const tr=series.filter(s=>s.pts.length>1);const trend=tr.filter(s=>{const d=s.pts[s.pts.length-1][1]-s.pts[0][1];return (d>0)===s.hi;}).length;

  const cards=defs.map(d=>{const raw=d.key==='weight'?S.weight:(S.metrics[d.key]||[]);if(!raw||!raw.length)return '';
    const last=raw[raw.length-1][1],first=raw[0][1],delta=last-first,good=(delta>0)===d.hi;
    const isPR=d.hi&&raw.length>1&&last>=Math.max(...raw.map(x=>x[1]));
    const col=d.key==='weight'?'#2DD4BF':colorFor(d.key);
    return `<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer" onclick="metricDetail('${d.key}')">
      <div style="width:6px;height:42px;border-radius:4px;background:${col}"></div>
      <div style="flex:1"><div style="display:flex;align-items:center;gap:6px">${d.name}${isPR?'<span style="background:#BEF264;color:#0E1217;font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px">PR</span>':''}</div>
        <div class="sm" style="color:${good?'#BEF264':'#8A949C'}">${last}${d.unit?' '+d.unit:''} · ${delta>=0?'+':''}${(+delta.toFixed(1))} since start</div></div>
      ${spark(raw,col)}<i class="ti ti-chevron-right muted"></i></div>`;}).join('');

  $('#view-progress').innerHTML=`
    <div class="card fade">
      <div class="row" style="justify-content:space-between;margin-bottom:8px"><h3 style="margin:0">Progress</h3>
        ${tr.length?`<span class="muted sm">${trend}/${tr.length} trending right</span>`:''}</div>
      <div style="margin-bottom:8px">${rangeBtns}</div>
      <svg width="100%" height="160" viewBox="0 0 300 160" role="img" aria-label="overlaid progress">${grid}${chart}</svg>
      <div class="legend" style="margin-top:10px">${legend}</div></div>
    <h3>Metrics</h3>${cards}
    <div class="row" style="gap:10px">
      <button class="ghost" onclick="pickLift()"><i class="ti ti-barbell"></i> Log a lift</button>
      <button class="ghost" onclick="estimateBF()"><i class="ti ti-ruler"></i> Body fat</button></div>
    <button class="ghost" style="margin-top:10px" onclick="addCustomMetric()"><i class="ti ti-plus"></i> Add a custom metric</button>`;
}

function loadScript(src){return new Promise((res,rej)=>{
  if([...document.scripts].some(s=>s.src===src))return res();
  const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.append(s);});}
function manualBarcode(){const c=prompt('Enter the barcode number to look up:');if(c&&c.trim())lookupBarcode(c.trim());}
// Camera barcode scanning that works in any browser incl. iPhone Safari
// (html5-qrcode uses getUserMedia + an in-browser decoder; needs HTTPS, which
// the deployed site has).
window.scanBarcode=async()=>{
  try{await loadScript('https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js');}
  catch(e){return manualBarcode();}
  if(typeof Html5Qrcode==='undefined')return manualBarcode();
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:#000;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px';
  wrap.innerHTML=`<div id="scanview" style="width:100%;max-width:340px;border-radius:16px;overflow:hidden;background:#111"></div>
    <div style="color:#fff;font-size:15px">Point at a product barcode</div>
    <button id="scanType" class="ghost" style="max-width:240px;color:#fff">Type the number instead</button>
    <button id="scanX" class="ghost" style="max-width:240px;color:#fff">Cancel</button>`;
  document.body.append(wrap);
  const F=Html5QrcodeSupportedFormats;
  const scanner=new Html5Qrcode('scanview',{formatsToSupport:[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128],verbose:false});
  let stopped=false;
  const cleanup=async()=>{if(stopped)return;stopped=true;try{await scanner.stop();}catch(e){}try{scanner.clear();}catch(e){}wrap.remove();};
  document.getElementById('scanX').onclick=cleanup;
  document.getElementById('scanType').onclick=async()=>{await cleanup();manualBarcode();};
  try{
    await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},
      async(text)=>{await cleanup();lookupBarcode(String(text).trim());},()=>{});
  }catch(e){await cleanup();toast('Camera blocked — allow it in Safari, then retry');manualBarcode();}
};
async function lookupBarcode(code){
  toast('Looking up '+code+'…');
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,brands,nutriments,serving_quantity');
    const j=await r.json();
    if(j.status!==1||!j.product){toast('Not in the database — try search');return;}
    const p=j.product,n=p.nutriments||{};
    const sq=p.serving_quantity?parseFloat(p.serving_quantity):null;const fac=sq&&sq>0?sq/100:1;
    confirmFood({name:p.product_name||'Product',brand:(p.brands||'').split(',')[0].trim(),off:true,
      serv:sq?`1 serving (${Math.round(sq)} g)`:'100 g',
      kcal:Math.round((n['energy-kcal_100g']||0)*fac),
      p:+(((n.proteins_100g||0))*fac).toFixed(1),c:+(((n.carbohydrates_100g||0))*fac).toFixed(1),f:+(((n.fat_100g||0))*fac).toFixed(1),
      m:offMicros(n,fac)});
  }catch(e){toast('Lookup failed — check connection');}
}

// ---- Snap food → Claude vision (real call with your own API key) ----
const FOOD_SCHEMA={type:'object',additionalProperties:false,required:['items'],properties:{items:{type:'array',items:{
  type:'object',additionalProperties:false,required:['name','kcal','protein_g','carb_g','fat_g','confidence'],
  properties:{name:{type:'string'},kcal:{type:'number'},protein_g:{type:'number'},carb_g:{type:'number'},fat_g:{type:'number'},confidence:{type:'number'}}}}}};
window.snapFood=async()=>{
  const key=localStorage.getItem('anthropicKey');
  if(!key){openKeySetup();return;}
  const file=await pickImage();
  if(!file)return;
  if(!/jpeg|png|gif|webp/.test(file.type||'')){toast('Use a JPEG or PNG photo');return;}
  const b64=await fileToB64(file);
  showLoading('Claude is reading your plate…');
  try{
    const items=await analyzeFood(b64,file.type,key);
    hideLoading();
    if(!items.length){toast('No foods detected — try a clearer photo');return;}
    aiConfirm(items);
  }catch(e){hideLoading();toast('AI error: '+e.message);}
};
function pickImage(){return new Promise(res=>{const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';i.onchange=()=>res(i.files[0]||null);i.click();});}
function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
async function analyzeFood(b64,mime,key){
  // Structured output via tool use (the reliable Anthropic pattern) — Claude is
  // forced to call log_foods, and we read the typed args from the tool_use block.
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:aiModel(),max_tokens:1024,
      tools:[{name:'log_foods',description:'Record every distinct food detected in the meal photo with estimated calories and macros for the portion actually shown.',input_schema:FOOD_SCHEMA}],
      tool_choice:{type:'tool',name:'log_foods'},
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:'Identify each distinct food in this meal photo and estimate calories and macros for the portion actually shown. Give a 0-1 confidence per item.'}]}]})});
  if(!r.ok){const t=await r.text();throw new Error('HTTP '+r.status+' '+t.slice(0,120));}
  const j=await r.json();
  if(j.stop_reason==='refusal')throw new Error('request declined');
  const tu=(j.content||[]).find(b=>b.type==='tool_use');
  const data=tu?tu.input:null;
  if(!data||!Array.isArray(data.items))throw new Error('no foods returned');
  return data.items.map(i=>({name:i.name||'Food',kcal:Math.round(i.kcal||0),
    p:Math.round(i.protein_g||0),c:Math.round(i.carb_g||0),f:Math.round(i.fat_g||0),conf:i.confidence??0.6,sel:true}));
}

function weekProteinAvg(){const d=weekData().filter(x=>x.kcal>0).map(x=>(S.history[dayKey(x.off)]||{}).p||0);return d.length?Math.round(d.reduce((a,b)=>a+b,0)/d.length):0;}
function weekSplit(){const wd=[],we=[];weekData().forEach(x=>{if(x.kcal>0){const dow=new Date(Date.now()+x.off*864e5).getDay();(dow===0||dow===6?we:wd).push(x.kcal);}});
  const avg=a=>a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):0;return{weekday:avg(wd),weekend:avg(we)};}
function proteinAdherence(){const d=weekData().filter(x=>x.kcal>0);if(!d.length)return 0;const hit=d.filter(x=>((S.history[dayKey(x.off)]||{}).p||0)>=GOAL.p*0.9).length;return Math.round(hit/d.length*100);}
function plateau(){if(S.weight.length<3)return false;const l=S.weight.slice(-3).map(x=>x[1]);return Math.max(...l)-Math.min(...l)<0.4;}
function weekStats(){const sp=weekSplit();return{days:weekData().filter(x=>x.kcal>0).length,avg:weekAvg(),avgP:weekProteinAvg(),st:streak(),
  wDelta:S.weight.length>1?(S.weight[S.weight.length-1][1]-S.weight[0][1]):0,weekday:sp.weekday,weekend:sp.weekend,pAdh:proteinAdherence(),plateau:plateau()};}
function milestones(){const out=[],st=streak();
  if(st>=7)out.push({i:'flame',c:'#F6B73C',t:st+'-day streak'});
  const wD=S.weight.length>1?(S.weight[S.weight.length-1][1]-S.weight[0][1]):0;
  if(wD<=-5)out.push({i:'trending-down',c:'#BEF264',t:Math.abs(Math.round(wD))+' kg down'});
  const b=S.metrics.bench;if(b&&b.length)out.push({i:'barbell',c:'#A78BFA',t:'Bench PR '+Math.max(...b.map(x=>x[1]))+' kg'});
  const bf=S.metrics.bodyfat;if(bf&&bf.length&&bf[bf.length-1][1]<18)out.push({i:'flame',c:'#2DD4BF',t:'Body fat '+bf[bf.length-1][1]+'%'});
  return out;}

function ruleReview(s){const L=[];
  L.push(`You logged ${s.days}/7 days and averaged ${fmt(s.avg)} kcal against your ${fmt(GOAL.cal)} target.`);
  L.push(`Protein averaged ${s.avgP}g and you hit your target on ${s.pAdh}% of logged days${s.pAdh>=80?' — that consistency is doing the heavy lifting.':'; locking protein first each day is your biggest lever.'}`);
  if(s.weekend>s.weekday+250)L.push(`Weekends ran ${fmt(s.weekend-s.weekday)} kcal above weekdays — pre-planning one weekend meal would tighten the week up.`);
  if(s.plateau)L.push(`Your weight trend is flat across the last few weigh-ins. If you're in a deficit, hold the line a week or two before changing anything — it's usually water masking real loss.`);
  else L.push(`Weight trend moved ${s.wDelta>0?'+':''}${s.wDelta.toFixed(1)} kg overall — moving the right direction.`);
  return L.join('\n\n');}

window.generateReview=async()=>{
  const s=weekStats(),key=localStorage.getItem('anthropicKey');

  showLoading('Claude is reviewing your week…');
  try{
    const prompt=`You are a supportive but honest nutrition coach. Write a ~120-word weekly review in 3 short paragraphs: what worked, what to watch, what to do next week. Specific and encouraging, not preachy. Data — days logged ${s.days}/7; avg ${s.avg} kcal vs ${GOAL.cal} target; avg protein ${s.avgP}g vs ${GOAL.p}g; protein target hit on ${s.pAdh}% of days; weekday avg ${s.weekday} kcal, weekend avg ${s.weekend} kcal; weight change ${s.wDelta.toFixed(1)}kg overall; ${s.st}-day streak${s.plateau?'; weight trend flat recently':''}.`;

    hideLoading();
    if(!r.ok)throw new Error('HTTP '+r.status);

function compressImage(file,maxW=340){return new Promise((res,rej)=>{const img=new Image();
  img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement('canvas');
    c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.6));};
  img.onerror=rej;img.src=URL.createObjectURL(file);});}

  properties:{body_fat_pct:{type:'number'},confidence:{type:'number'},notes:{type:'string'}}};
async function analyzeBF(dataUrl,key){
  const comma=dataUrl.indexOf(','),meta=dataUrl.slice(0,comma),b64=dataUrl.slice(comma+1);
  const mime=(meta.match(/data:(.*?);/)||[])[1]||'image/jpeg';
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:aiModel(),max_tokens:512,
      tools:[{name:'estimate_bf',description:'Estimate visible body-fat percentage from a physique progress photo.',input_schema:BF_SCHEMA}],
      tool_choice:{type:'tool',name:'estimate_bf'},
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:'Estimate this persons body-fat percentage from the photo. Give one number, a 0-1 confidence, and a one-line note on visible cues. This is a rough visual estimate only.'}]}]})});
  if(!r.ok){const t=await r.text();throw new Error('HTTP '+r.status+' '+t.slice(0,110));}
  const j=await r.json();if(j.stop_reason==='refusal')throw new Error('declined');

  <i class="ti ti-lock" style="font-size:54px;color:var(--accent)"></i>
  <h3 style="margin:16px 0 6px">Vault locked</h3>
  <div class="muted sm" style="margin-bottom:18px">Enter your PIN to view your progress archive.</div>
  <input id="pinv" class="in" inputmode="numeric" maxlength="6" placeholder="PIN" style="max-width:200px;margin:0 auto 12px;text-align:center;letter-spacing:6px" onkeydown="if(event.key==='Enter')tryUnlock()">
  <button class="btn" style="max-width:200px;margin:0 auto" onclick="tryUnlock()">Unlock</button></div>`;
  setTimeout(()=>{const e=document.getElementById('pinv');if(e)e.focus();},50);}

function renderVault(){
  if(S.lock&&S.lock.enabled&&!_vaultUnlocked){renderVaultLock();return;}
  const ms=milestones(),allTags=[...new Set(S.capsules.flatMap(c=>c.tags||[]))];
  $('#view-vault').innerHTML=`
    <div class="row" style="justify-content:space-between;margin:4px 2px 12px"><h3 style="margin:0">Progress Vault</h3>
      <i class="ti ti-${S.lock.enabled?'lock':'lock-open'} muted" style="cursor:pointer;font-size:18px" onclick="${S.lock.enabled?'lockVaultNow()':'setupVaultLock()'}"></i></div>
    ${ms.length?`<div class="hscroll" style="margin-bottom:14px">${ms.map(m=>`<div class="qchip" style="min-width:auto;display:flex;align-items:center;gap:8px"><i class="ti ti-${m.i}" style="color:${m.c};font-size:18px"></i><span style="font-weight:600;white-space:nowrap">${m.t}</span></div>`).join('')}</div>`:''}
    <button class="btn" style="margin-bottom:12px" onclick="generateReview()"><i class="ti ti-sparkles"></i> Generate weekly review</button>
    <div id="vaultPhotos" style="margin-bottom:18px"></div>
    <input class="in" placeholder="Search your Vault…" value="${_vQ.replace(/"/g,'&quot;')}" oninput="_vQ=this.value;renderVaultList()" style="margin-bottom:10px">
    ${allTags.length?`<div style="margin-bottom:12px"><button class="chip ${!_vTag?'on':''}" onclick="setVTag(null)">All</button>${allTags.map(t=>`<button class="chip ${_vTag===t?'on':''}" onclick="setVTag('${t.replace(/'/g,'')}')">${t}</button>`).join('')}</div>`:''}
    <div id="vaultList"></div>
    <button class="ghost" style="margin-top:6px" onclick="saveCapsule()"><i class="ti ti-plus"></i> Save this week as a capsule</button>`;
  renderVaultList();renderPhotos();
}
window.saveCapsule=()=>{const s=weekStats();const tags=['cutting'];if(s.pAdh>=80)tags.push('high protein');if(s.st>=7)tags.push('best week');
  S.capsules.unshift({day:today(),title:s.st>=7?'Best week':'Weekly capsule',tags,kcal:s.avg,protein:s.avgP,streak:s.st,days:s.days});
  save();renderVault();toast('Saved to Vault');};

function renderMore(){
  $('#view-more').innerHTML=`
    <div class="card"><div class="row" style="gap:12px"><i class="ti ti-user" style="font-size:22px"></i>
      <div><div>You</div><div class="muted sm">Recomp · 2200 kcal · 176g protein</div></div></div></div>
    <div class="card" onclick="openCoachSettings()" style="cursor:pointer">
      <div class="row" style="justify-content:space-between"><span><i class="ti ti-barbell"></i> Gym coach &amp; alerts</span>
      <span class="muted sm">${S.coach.enabled?'Alerts on':'Gym '+fmtTime((+S.coach.gymTime.split(':')[0])*60+(+S.coach.gymTime.split(':')[1]))}</span></div></div>
    <div class="card" onclick="openKeySetup()" style="cursor:pointer">
      <div class="row" style="justify-content:space-between"><span><i class="ti ti-camera"></i> Food photo AI</span>
      <span class="muted sm">${localStorage.getItem('anthropicKey')?'On':'Set up'}</span></div></div>
    <div class="card" onclick="setupVaultLock()" style="cursor:pointer">
      <div class="row" style="justify-content:space-between"><span><i class="ti ti-lock"></i> Vault privacy lock</span>
      <span class="muted sm">${S.lock.enabled?'On':'Off'}</span></div></div>
    <div class="card" onclick="if(confirm('Reset all demo data?')){localStorage.removeItem('mv6');S=load();renderAll();toast('Reset');}" style="cursor:pointer">
      <div class="row" style="justify-content:space-between"><span><i class="ti ti-refresh"></i> Reset demo data</span></div></div>
    <div class="muted sm" style="text-align:center;margin-top:16px">Web preview of MacroVault.<br>The native iOS app adds barcode scan, camera AI, biometric Vault lock & encrypted storage.</div>`;
}

function renderAll(){renderToday();renderProgress();renderVault();renderMore();}
function animateToday(){const el=$('#view-today');el.classList.remove('anim');void el.offsetWidth;el.classList.add('anim');}
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>{
  const tab=b.dataset.tab;
  document.querySelectorAll('.tabbar button').forEach(x=>x.classList.toggle('on',x===b));
  ['today','progress','vault','more'].forEach(v=>$('#view-'+v).style.display=v===tab?'block':'none');
  $('#hTitle').textContent={today:'MacroVault',progress:'Progress',vault:'Vault',more:'More'}[tab];
  if(tab==='today')animateToday();
});
renderAll();
animateToday();
scheduleCoach();
</script>
</body>
</html>
