name: macrovault
description: MacroVault — a private, local-first proof-of-progress nutrition & body-tracking app.
publish_to: "none"
version: 0.1.0+1

environment:
  # Uses the Color.withValues API (Flutter 3.27+ / Dart 3.6+).
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Encrypted local database (SQLCipher-backed SQLite)
  sqflite_sqlcipher: ^3.1.0+1
  sqflite_common: ^2.5.4
  path: ^1.9.0
  path_provider: ^2.1.3

  # Secure key storage + device auth for the Vault lock
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0

  # Camera / barcode / images
  mobile_scanner: ^5.1.1
  image_picker: ^1.1.2
  image: ^4.2.0 # decode + re-encode to strip EXIF

  # Networking for Open Food Facts / USDA
  http: ^1.2.1

  # Charts (weight trend, measurements)
  fl_chart: ^0.68.0

  # Export
  archive: ^3.6.1
  share_plus: ^9.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
